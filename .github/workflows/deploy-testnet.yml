name: Deploy — Arbitrum Sepolia Testnet

on:
  push:
    branches: [main]
    paths:
      - 'packages/contracts/src/**'
      - 'packages/contracts/script/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force redeploy even if no contract changes'
        required: false
        type: boolean

jobs:
  deploy:
    name: Deploy to Arbitrum Sepolia
    runs-on: ubuntu-latest
    environment: testnet
    concurrency:
      group: testnet-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install contract dependencies
        run: cd packages/contracts && forge install

      - name: Run tests before deploy
        run: cd packages/contracts && forge test -vvv
        env:
          FOUNDRY_PROFILE: ci

      - name: Deploy to Arbitrum Sepolia
        run: |
          cd packages/contracts
          forge script script/DeployTestnet.s.sol \
            --rpc-url $ARBITRUM_SEPOLIA_RPC \
            --private-key $PRIVATE_KEY \
            --broadcast \
            --verify \
            --etherscan-api-key $ARBISCAN_API_KEY \
            --delay 20 \
            -vvvv
        env:
          ARBITRUM_SEPOLIA_RPC: ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          DEPLOYER_ADDRESS: ${{ secrets.DEPLOYER_ADDRESS }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
          USDC_ADDRESS_SEPOLIA: '0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d'

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployments-sepolia
          path: packages/contracts/deployments/421614.json

      - name: Update subgraph addresses
        run: |
          # Parse deployment JSON and update subgraph.yaml
          FACTORY=$(cat packages/contracts/deployments/421614.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['circleFactory'])")
          CIRCLE=$(cat packages/contracts/deployments/421614.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['circle'])")
          SCORE=$(cat packages/contracts/deployments/421614.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['creditScore'])")
          ATTEST=$(cat packages/contracts/deployments/421614.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['attestations'])")
          echo "CircleFactory: $FACTORY"
          echo "Circle: $CIRCLE"
          echo "CreditScore: $SCORE"
          echo "Attestations: $ATTEST"

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"Testnet deployment **${STATUS}** on Arbitrum Sepolia\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }} || true

  smoke-test:
    name: Post-deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployments-sepolia
          path: packages/contracts/deployments/

      - name: Run smoke tests
        run: |
          # Verify contracts are deployed and accessible
          FACTORY=$(cat packages/contracts/deployments/421614.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['circleFactory'])")
          echo "Verifying CircleFactory at $FACTORY..."
          # TODO: Add RPC call to verify contract code
        env:
          ARBITRUM_SEPOLIA_RPC: ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
