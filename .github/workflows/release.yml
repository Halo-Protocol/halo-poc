name: Release — SDK Publish & Subgraph Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

jobs:
  sdk-publish:
    name: Publish @halo-protocol/sdk to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check SDK
        run: pnpm --filter @halo-protocol/sdk typecheck

      - name: Build SDK
        run: pnpm --filter @halo-protocol/sdk build

      - name: Publish to npm
        run: pnpm --filter @halo-protocol/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  subgraph-deploy:
    name: Deploy Subgraph (Mainnet)
    runs-on: ubuntu-latest
    needs: sdk-publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install graph-cli
        run: npm install -g @graphprotocol/graph-cli

      - name: Deploy Subgraph
        run: |
          cd packages/subgraph
          graph auth --studio ${{ secrets.GRAPH_ACCESS_TOKEN }}
          graph codegen
          graph build
          graph deploy --studio halo-protocol-mainnet --version-label ${{ github.ref_name }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [sdk-publish]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Halo Protocol ${tag}`,
              body: `## Release ${tag}\n\n- SDK published to npm: \`@halo-protocol/sdk@${tag.replace('v','')}\`\n- Subgraph deployed to The Graph mainnet\n`,
              draft: false,
              prerelease: tag.includes('beta') || tag.includes('alpha'),
            });

  backend-deploy:
    name: Deploy Backend (Fly.io)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config packages/backend/fly.toml
        working-directory: packages/backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  frontend-deploy:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: packages/frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
